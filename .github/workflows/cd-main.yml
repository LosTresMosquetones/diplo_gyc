name: CD Main - Flujo de Entrega y Despliegue

on:
  push:
    tags:
      - 'v*.*.*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  verificar-rama-origen:
    name: Verificar que el Tag esté en Main
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validar si el commit pertenece a la rama main
        run: |
          echo "🔍 Analizando el commit asociado al tag..."
          git fetch origin main
          # Verifica si el commit actual (${{ github.sha }}) está dentro de la historia de origin/main
          if git branch -r --contains ${{ github.sha }} | grep -q "origin/main"; then
            echo "✅ PASS: El tag fue creado sobre un commit de la rama main."
          else
            echo "❌ ERROR: El tag no pertenece a la rama main. El despliegue se cancela."
            exit 1
          fi

  entrega-build-and-push:
    name: Construir y Subir Imágenes
    needs: verificar-rama-origen
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Login en GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Empaqueta usando el Tag Semántico como nombre de versión
      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:${{ github.ref_name }}

      - name: Build & Push BFF
        uses: docker/build-push-action@v5
        with:
          context: ./bff
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-bff:${{ github.ref_name }}

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:${{ github.ref_name }}

  despliegue-staging:
    name: Despliegue a Staging
    needs: entrega-build-and-push
    environment: staging
    runs-on: ubuntu-latest
    steps:
      - name: Ejecutar despliegue en Staging
        run: |
          echo "Desplegando la versión oficial ${{ github.ref_name }} en Staging..."

  despliegue-produccion:
    name: Despliegue a Producción
    needs: despliegue-staging
    environment: production
    runs-on: ubuntu-latest
    steps:
      - name: Ejecutar despliegue en Producción
        run: |
          echo "¡Aprobación manual recibida!"
          echo "Desplegando la versión oficial ${{ github.ref_name }} en Producción."
